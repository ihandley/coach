name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:

jobs:
  test-and-typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format

      - name: Core tests
        run: pnpm --filter @coach/core exec vitest run

      - name: DB tests
        run: pnpm --filter @coach/db exec vitest run

      - name: Web tests
        run: pnpm --filter job-coach-web exec vitest run

      - name: Core typecheck
        run: pnpm --filter @coach/core typecheck

      - name: DB typecheck
        run: pnpm --filter @coach/db typecheck

      - name: Web typecheck
        run: pnpm --filter job-coach-web typecheck
